<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> </title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: sans-serif;
    }

    /* stars */
    .stars {
        position: absolute;
        width: 100%;
        height: 100%;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
        100px 200px white, 300px 400px white, 500px 100px white,
        800px 300px white, 1200px 600px white, 1500px 200px white,
        1700px 700px white, 1900px 500px white, 600px 800px white;
        animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
        from { opacity: 0.2; }
        to { opacity: 1; }
    }

    /* PLAY BUTTON (fixed) */
    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        border: 2px solid rgba(255,255,255,0.8);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(2px);
        transition: 0.3s;
    }

    .play-btn:hover {
        transform: translate(-50%, -50%) scale(1.1);
        background: rgba(255,255,255,0.1);
    }

    .triangle {
        width: 0;
        height: 0;
        border-left: 18px solid white;
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        margin-left: 5px;
    }

</style>
</head>

<body>

<div class="stars"></div>

<div class="play-btn" onclick="playAudio()">
    <div class="triangle"></div>
</div>

<audio id="music" src="https://files.catbox.moe/8qfhg7.mp3"></audio>

<script>
const audio = document.getElementById("music");

function playAudio() {
    audio.volume = 0.4;
    audio.play();

    // remove button after click
    document.querySelector(".play-btn").style.display = "none";
}
</script>

</body>
</html>
