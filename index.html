<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> </title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }

    /* star layers */
    .stars, .stars2, .stars3 {
        position: absolute;
        width: 100%;
        height: 100%;
        background: transparent;
    }

    .stars::after {
        content: "";
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        box-shadow:
        100px 200px white, 300px 400px white, 500px 100px white,
        800px 300px white, 1200px 600px white, 1500px 200px white,
        1700px 700px white, 1900px 500px white, 600px 800px white,
        400px 900px white, 900px 1200px white, 1300px 300px white;
        animation: twinkle 3s infinite alternate;
    }

    .stars2::after {
        content: "";
        position: absolute;
        width: 1.5px;
        height: 1.5px;
        background: white;
        box-shadow:
        50px 150px white, 250px 350px white, 450px 250px white,
        750px 450px white, 1100px 550px white, 1400px 350px white,
        1650px 650px white, 1850px 450px white, 700px 700px white,
        300px 1100px white, 1000px 100px white, 1600px 900px white;
        animation: twinkle 4s infinite alternate;
    }

    .stars3::after {
        content: "";
        position: absolute;
        width: 1px;
        height: 1px;
        background: white;
        box-shadow:
        120px 220px white, 320px 420px white, 520px 120px white,
        820px 320px white, 1220px 620px white, 1520px 220px white,
        1720px 720px white, 1920px 520px white, 620px 820px white,
        420px 920px white, 920px 1220px white, 1320px 320px white;
        animation: twinkle 5s infinite alternate;
    }

    @keyframes twinkle {
        from { opacity: 0.2; }
        to { opacity: 1; }
    }

    /* invisible click layer */
    .click {
        position: absolute;
        width: 100%;
        height: 100%;
        cursor: pointer;
    }

    /* subtle hint text */
    .hint {
        position: absolute;
        width: 100%;
        top: 50%;
        text-align: center;
        color: rgba(255,255,255,0.08);
        font-size: 14px;
        letter-spacing: 2px;
    }
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="stars3"></div>

<div class="hint"> </div>
<div class="click" onclick="playAudio()"></div>

<audio id="music" src="https://files.catbox.moe/8qfhg7.mp3" autoplay></audio>

<script>
const audio = document.getElementById("music");

// try autoplay
window.onload = () => {
    audio.volume = 0.5;
    audio.play().catch(() => {
        // autoplay blocked → waits for click
        document.body.addEventListener("click", () => {
            audio.play();
        }, { once: true });
    });
};

function playAudio() {
    audio.play();
}
</script>

</body>
</html>
